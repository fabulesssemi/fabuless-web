name: Daily Newsletter

on:
  workflow_dispatch: {}
  schedule:
    # 13:00 UTC weekdays — after /api/editorial/refresh (11:00 UTC) populates
    # rss_articles + homepage_articles with images, before the Vercel send-semi
    # cron (16:00 UTC) fires. Keeps content generation from going stale silently.
    - cron: "0 13 * * 1-5"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build issue
        env:
          ANTHROPIC_API_KEY:              ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY:           ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npx tsx scripts/build-newsletter.ts --auto
      - name: Commit & push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add lib/issues.ts app/archive/
          git diff --staged --quiet || git commit -m "chore: daily newsletter $(date +%Y-%m-%d) [skip ci]"
          git push
      - name: Refresh homepage cache
        run: curl -fsS "https://fabuless.ai/api/homepage/refresh" || true
      - name: Send newsletter
        env:
          ANTHROPIC_API_KEY:              ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:                 ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY:           ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npx tsx scripts/send-newsletter.ts --auto

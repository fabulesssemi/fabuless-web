name: Daily Newsletter

on:
  schedule:
    - cron: "0 14 * * 1-5"   # 10am ET Mon–Fri
  workflow_dispatch: {}        # manual trigger any time

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── 1. Pull articles from Supabase, curate with Claude, build issue ───
      - name: Build issue
        env:
          ANTHROPIC_API_KEY:              ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx tsx scripts/build-newsletter.ts --auto

      # ── 2. Commit + push (triggers Vercel deploy) ─────────────────────────
      - name: Commit & push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add lib/issues.ts app/archive/
          git diff --staged --quiet || git commit -m "chore: daily newsletter $(date +%Y-%m-%d) [skip ci]"
          git push

      # ── 3. Flush ISR cache ────────────────────────────────────────────────
      - name: Refresh homepage cache
        run: curl -fsS "https://fabuless.ai/api/homepage/refresh" || true

      # ── 4. Send to subscribers ────────────────────────────────────────────
      - name: Send newsletter
        env:
          ANTHROPIC_API_KEY:              ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:                 ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:       ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:  ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx tsx scripts/send-newsletter.ts --auto

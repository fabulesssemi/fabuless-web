name: Weekly Insider Trading Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests lxml

      - name: Run insider trading updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_insider_trading.py

      - name: Commit and push updated data
        run: |
          git config user.name "Fabuless Bot"
          git config user.email "bot@fabuless.ai"
          git add lib/insider-trading.ts
          git diff --cached --quiet || git commit -m "chore: weekly insider trading update $(date +%Y-%m-%d)"
          git push

name: Update Quantum Articles

on:
  schedule:
    - cron: "15 15 * * *"   # 11:15am ET daily
  workflow_dispatch:
    inputs:
      force:
        description: "Force regenerate existing articles"
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run quantum article pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          npx tsx scripts/update-quantum-articles.ts $ARGS
      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/quantum-articles.json
          git diff --staged --quiet || git commit -m "chore: update quantum articles [skip ci]"
          git push
